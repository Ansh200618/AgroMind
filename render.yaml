services:
  - type: web
    name: agromind-ai
    env: python
    rootDir: ai-service
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: MODEL_DIR
        value: ./models
      - key: LOG_LEVEL
        value: info

  - type: web
    name: agromind-api
    env: node
    rootDir: backend
    plan: free
    buildCommand: npm install && npx prisma generate && npm run build
    startCommand: npx prisma migrate deploy && node dist/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      # REQUIRED: replace <username> with your GitHub username (e.g., https://johndoe.github.io) or set your actual frontend domain URL.
      - key: CORS_ORIGIN
        value: https://<username>.github.io
      - key: UPLOAD_DIR
        value: ./uploads
      - key: MAX_FILE_SIZE_MB
        value: 10
      - key: AI_SERVICE_URL
        value: https://agromind-ai.onrender.com
      - key: DATABASE_URL
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
